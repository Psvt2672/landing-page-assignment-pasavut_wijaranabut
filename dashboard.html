<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="images/owndays.ico">
  <title>OWNDAYS — Registration Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

  <!-- Header -->
  <header class="topbar">
    <div class="topbar__brand">
      <span class="topbar__name">OWNDAYS</span>
      <span class="topbar__sep">|</span>
      <span class="topbar__subtitle">Campaign Dashboard</span>
    </div>
    <div class="topbar__meta">
      <span class="topbar__visits" id="visitCount">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="5" r="2.5" stroke="currentColor" stroke-width="1.2"/><path d="M2 12c0-2.761 2.239-4 5-4s5 1.239 5 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        <span id="visitCountVal">—</span> page views
      </span>
      <a href="index.html" class="topbar__link">← Back to Campaign</a>
    </div>
  </header>

  <!-- ═══ MAIN ═══ -->
  <main class="dash">

    <!-- ── Stat Cards ── -->
    <section class="stats" id="statsRow">
      <div class="stat-card">
        <p class="stat-card__label">Total Sign-ups</p>
        <p class="stat-card__value" id="statTotal">—</p>
      </div>
      <div class="stat-card">
        <p class="stat-card__label">This Week</p>
        <p class="stat-card__value" id="statWeek">—</p>
      </div>
      <div class="stat-card">
        <p class="stat-card__label">Most Popular Store</p>
        <p class="stat-card__value stat-card__value--sm" id="statTopStore">—</p>
      </div>
      <div class="stat-card">
        <p class="stat-card__label">Next 7 Days</p>
        <p class="stat-card__value" id="statUpcoming">—</p>
      </div>
    </section>

    <!-- ── Charts ── -->
    <section class="charts">
      <div class="chart-card">
        <h2 class="chart-card__title">Sign-ups by Store</h2>
        <div class="chart-wrap" id="storeChart"></div>
      </div>
      <div class="chart-card">
        <h2 class="chart-card__title">Sign-ups by Date</h2>
        <div class="chart-wrap chart-wrap--timeline" id="dateChart"></div>
      </div>
    </section>

    <!-- ── Filters ── -->
    <section class="filters">
      <div class="filters__group">
        <label class="filters__label" for="filterStore">Store</label>
        <div class="field__select-wrap">
          <select class="filters__input filters__select" id="filterStore">
            <option value="">All Stores</option>
            <option value="centralramindra">Central Ramindra</option>
            <option value="fashionisland">Fashion Island</option>
            <option value="centralworld">CentralWorld</option>
            <option value="megabangna">Mega Bangna</option>
            <option value="centralplazawestgest">CentralPlaza Westgate</option>
          </select>
          <svg class="field__chevron" width="14" height="14" viewBox="0 0 14 14"><path d="M2 4.5l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </div>
      </div>
      <div class="filters__group">
        <label class="filters__label" for="filterDateFrom">Date From</label>
        <input class="filters__input" type="date" id="filterDateFrom" />
      </div>
      <div class="filters__group">
        <label class="filters__label" for="filterDateTo">Date To</label>
        <input class="filters__input" type="date" id="filterDateTo" />
      </div>
      <div class="filters__group filters__group--search">
        <label class="filters__label" for="filterSearch">Search</label>
        <input class="filters__input" type="search" id="filterSearch" placeholder="Name, email or phone…" />
      </div>
      <button class="filters__clear" id="clearFilters">Clear</button>
    </section>

    <!-- Table -->
    <section class="table-section">
      <div class="table-section__header">
        <p class="table-section__count" id="tableCount">— registrations</p>
        <button class="export-btn" id="exportBtn">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 1v9M4 7l3.5 3.5L11 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 12h11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Export CSV
        </button>
      </div>

      <div class="table-wrap">
        <table class="reg-table" id="regTable">
          <thead>
            <tr>
              <th data-col="name">Name <span class="sort-icon">↕</span></th>
              <th data-col="email">Email <span class="sort-icon">↕</span></th>
              <th data-col="phone">Phone</th>
              <th data-col="store">Store <span class="sort-icon">↕</span></th>
              <th data-col="preferred_date">Preferred Date <span class="sort-icon">↕</span></th>
              <th data-col="registered_at">Registered <span class="sort-icon">↕</span></th>
            </tr>
          </thead>
          <tbody id="regTableBody"></tbody>
        </table>
        <div class="table-empty" id="tableEmpty" hidden>
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="#E2E5EA" stroke-width="2"/><path d="M13 20h14M20 13v14" stroke="#E2E5EA" stroke-width="2" stroke-linecap="round"/></svg>
          <p>No registrations match your filters.</p>
        </div>
      </div>
    </section>

  </main>

  <script src="dashboard.js"></script>
</body>
</html>
